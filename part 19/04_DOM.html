<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <ul class="language">
        <li>javaScript</li>
    </ul>
</body>
<script>




    //not a good pratice to use innerHtml
    function addLanguage(langname) {
        const li = document.createElement('li');
        li.innerHTML = `${langname}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python");


    //best way always use
    //create
    function addOptiLanguage(langname) {
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langname));
        document.querySelector('.language').appendChild(li);
    }
    addOptiLanguage('golang');

    //edit using innerHTML not a good pratice
    // const secondlang = document.querySelector("li:nth-child(2)");
    // secondlang.innerHTML = "Mozo";


    //edit using textContent
    const secondlang = document.querySelector("li:nth-child(2)");
    const newli = document.createElement('li');
    newli.textContent = "mojo";
    secondlang.replaceWith(newli)


    //edit
    const firstland = document.querySelector("li:first-child");
    firstland.outerHTML = '<li>TypeScript</li>'


    //rreemove
    const lastlang = document.querySelector('li:last-child');
    lastlang.remove();



</script>
</html>
